<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E2E PWA-POS Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
  </head>
  <body class="bg-gray-900 text-white font-mono h-screen flex flex-col">
    <header
      class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center"
    >
      <h1 class="text-xl font-bold text-green-400">AsstroPOS E2E Auditor</h1>
      <span
        id="statusBadge"
        class="px-3 py-1 bg-yellow-500 text-black font-bold rounded"
        >MENUNGGU UJIAN...</span
      >
    </header>

    <div class="flex-1 flex overflow-hidden">
      <div
        class="w-1/3 bg-gray-800 border-r border-gray-700 p-4 overflow-y-auto"
      >
        <h2 class="text-lg font-bold mb-4 border-b border-gray-600 pb-2">
          Checkpoints
        </h2>
        <ul id="logList" class="space-y-2 text-sm"></ul>
      </div>

      <div class="w-2/3 flex flex-col">
        <div
          class="h-1/2 p-4 border-b border-gray-700 bg-gray-900 overflow-y-auto"
        >
          <h2 class="text-lg font-bold mb-2 text-blue-400">
            Hulu (Frontend Local Ledger)
          </h2>
          <pre
            id="localState"
            class="text-xs text-gray-300 whitespace-pre-wrap"
          ></pre>
        </div>

        <div class="h-1/2 p-4 bg-gray-900 overflow-y-auto">
          <h2 class="text-lg font-bold mb-2 text-purple-400">
            Hilir (Backend PostgreSQL)
          </h2>
          <pre
            id="serverState"
            class="text-xs text-gray-300 whitespace-pre-wrap"
          ></pre>
        </div>
      </div>
    </div>

    <script>
      const socket = io();
      const logList = document.getElementById("logList");
      const localState = document.getElementById("localState");
      const serverState = document.getElementById("serverState");
      const statusBadge = document.getElementById("statusBadge");

      socket.on("log", (msg) => {
        const li = document.createElement("li");
        li.textContent = `> ${msg}`;
        if (msg.includes("ERROR") || msg.includes("GAGAL")) {
          li.className = "text-red-400 font-bold";
          statusBadge.textContent = "AUDIT GAGAL - AUTO RESET";
          statusBadge.className =
            "px-3 py-1 bg-red-600 text-white font-bold rounded";
        } else if (msg.includes("SELESAI") || msg.includes("BERHASIL")) {
          li.className = "text-green-400";
        }
        logList.appendChild(li);
        logList.scrollTop = logList.scrollHeight;
      });

      socket.on("stateUpdate", (data) => {
        if (data.local)
          localState.textContent = JSON.stringify(data.local, null, 2);
        if (data.server)
          serverState.textContent = JSON.stringify(data.server, null, 2);
      });

      socket.on("auditComplete", () => {
        statusBadge.textContent = "AUDIT HIJAU (PASSED)";
        statusBadge.className =
          "px-3 py-1 bg-green-500 text-black font-bold rounded";
      });
    </script>
  </body>
</html>
