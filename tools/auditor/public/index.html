<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auditor - Evidence Engine Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --text: #e2e8f0;
      --panel: #1e293b;
      --border: #334155;
      --accent: #3b82f6;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: var(--panel);
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }
    .status-dot.disconnected {
      background: var(--error);
      box-shadow: 0 0 8px var(--error);
    }
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 350px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
    }
    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.875rem;
    }
    .log-entry {
      padding: 0.5rem;
      border-bottom: 1px solid var(--border);
      word-break: break-all;
    }
    .main-content {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .report-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      overflow: hidden;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .report-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .report-title {
      font-weight: 600;
      font-size: 1.125rem;
      margin-bottom: 0.25rem;
    }
    .report-meta {
      font-size: 0.875rem;
      color: #94a3b8;
      font-family: monospace;
    }
    .badge {
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge.success { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .badge.error { background: rgba(239, 68, 68, 0.2); color: var(--error); }
    .badge.warning { background: rgba(245, 158, 11, 0.2); color: var(--warning); }

    .evidence-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 1rem;
      padding: 1.5rem;
      background: rgba(0,0,0,0.2);
    }
    .evidence-item {
      text-align: center;
      padding: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
    }
    .evidence-value {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .evidence-value.active { color: var(--accent); }
    .evidence-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
    }

    .diagnosis-box {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .diagnosis-text {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    .diagnosis-text.error { color: var(--error); }

    .diff-container {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      background: #000;
      font-family: monospace;
      font-size: 0.875rem;
    }
    .diff-title {
      color: #94a3b8;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }
    .diff-item.INSERT { color: var(--success); }
    .diff-item.DELETE { color: var(--error); }
    .diff-item.UPDATE { color: var(--warning); }
  </script>
</head>
<body>
  <header>
    <h1>
      <div id="statusDot" class="status-dot disconnected"></div>
      Auditor Evidence Engine
    </h1>
    <div style="font-size: 0.875rem; color: #94a3b8;">
      Waiting for Playwright Browser interactions...
    </div>
  </header>

  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">System Logs</div>
      <div id="sysLogs" class="log-container"></div>
    </div>

    <div class="main-content" id="reportsContainer">
      <!-- Reports will be inserted here -->
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
